<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Miniflux Read Marker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div>
          <h1>Miniflux</h1>
          <p id="subtitle">Checking current tab…</p>
        </div>
        <button id="open-settings" type="button" class="link" aria-label="Settings">
          Settings
        </button>
      </header>

      <section id="entry" class="entry hidden">
        <h2 id="entry-title"></h2>
        <p class="meta" id="entry-url"></p>
        <p class="status" id="entry-status"></p>
      </section>

      <section id="empty" class="empty hidden">
        <p>No matching Miniflux entry for this page.</p>
      </section>

      <section id="missing" class="empty hidden">
        <p>Set your Base URL and API token in the extension settings.</p>
      </section>

      <div class="actions">
        <div id="entry-actions" class="entry-actions">
          <button id="mark-read" type="button" class="primary" disabled>Mark Read</button>
        </div>
        <button id="toggle-domain" type="button" class="secondary" disabled>
          Disable for domain
        </button>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
